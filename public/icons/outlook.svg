<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Microsoft blue background -->
  <rect width="24" height="24" rx="3" fill="#0078D4"/>
  <!-- White calendar page (right side) -->
  <rect x="11" y="5" width="11" height="14" rx="1.5" fill="white"/>
  <!-- Calendar header bar -->
  <rect x="11" y="5" width="11" height="3.5" rx="1.5" fill="#106EBE"/>
  <rect x="11" y="7" width="11" height="1.5" fill="#106EBE"/>
  <!-- Calendar dots -->
  <circle cx="14.5" cy="12" r="1" fill="#0078D4"/>
  <circle cx="18.5" cy="12" r="1" fill="#0078D4"/>
  <circle cx="14.5" cy="15.5" r="1" fill="#0078D4"/>
  <circle cx="18.5" cy="15.5" r="1" fill="#0078D4"/>
  <!-- Outlook "O" ring overlapping left side -->
  <circle cx="9" cy="12" r="6.5" fill="#0078D4" stroke="white" stroke-width="2"/>
  <circle cx="9" cy="12" r="3" fill="#0078D4"/>
  <!-- Inner white ring to form the O letterform -->
  <circle cx="9" cy="12" r="3" fill="none" stroke="white" stroke-width="2.5"/>
</svg>
